<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thần Số Học - Huyền Cơ So Sánh</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @keyframes fade-in-up {
            from {
                opacity: 0;
                transform: translateY(1.5rem);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fade-in-up {
            animation: fade-in-up 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* Ẩn mũi tên của input type number */
        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        input[type=number] {
            -moz-appearance: textfield;
        }

        /* Tùy chỉnh thanh cuộn (Scrollbar) cho giao diện sạch hơn */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f5f9;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        /* Hiệu ứng focus cho input custom */
        .input-ring-custom:focus-within {
            box-shadow: 0 0 0 2px #0ea5e9, 0 0 0 4px rgba(14, 165, 233, 0.2);
        }
    </style>
</head>

<body class="min-h-screen bg-slate-100 font-sans text-slate-800 selection:bg-sky-200 overflow-x-hidden">

    <div id="app" class="p-3 sm:p-4 md:p-8 w-full max-w-[100vw]">
        <div class="max-w-7xl mx-auto">

            <div id="tabs-container" class="flex flex-col sm:flex-row gap-3 md:gap-4 mb-6 md:mb-8"></div>

            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-4 sm:p-6 mb-8 animate-fade-in-up">

                <h3
                    class="text-lg sm:text-xl font-bold text-slate-800 mb-4 pb-2 border-b-2 border-sky-500 inline-flex items-center gap-2">
                    <i data-lucide="hourglass" class="w-5 h-5 text-sky-600"></i> Thông tin thời gian
                </h3>

                <div id="time-form-container" class="grid grid-cols-1 md:grid-cols-2 gap-4 sm:gap-6 mb-8"></div>

                <h3
                    class="text-lg sm:text-xl font-bold text-slate-800 mb-4 pb-2 border-b-2 border-sky-500 inline-flex items-center gap-2">
                    <i data-lucide="user-plus" class="w-5 h-5 text-sky-600"></i> Danh sách người xem
                </h3>

                <div id="people-list-container" class="space-y-4 mb-6"></div>

                <button id="btn-add-person"
                    class="mb-8 w-full sm:w-auto px-5 py-3 bg-emerald-500 hover:bg-emerald-600 text-white font-bold rounded-xl shadow-sm shadow-emerald-200 transition-all active:scale-95 flex items-center justify-center sm:justify-start gap-2">
                    <i data-lucide="user-plus" class="w-5 h-5"></i> Thêm người tra cứu
                </button>

                <button id="btn-generate"
                    class="w-full py-4 bg-gradient-to-r from-sky-600 to-blue-700 hover:from-sky-700 hover:to-blue-800 text-white font-bold text-base sm:text-lg rounded-xl shadow-md shadow-blue-200 transition-all active:scale-[0.98] flex justify-center items-center gap-2 uppercase tracking-wide">
                    <i data-lucide="sparkles" class="w-6 h-6"></i> KẾT QUẢ SO SÁNH
                </button>
            </div>

            <div id="results-container"></div>

        </div>
    </div>

    <script>
        // --- HẰNG SỐ & QUY TẮC THẦN SỐ HỌC ---
        const NGU_HANH_RULES = {
            "KIM": [1, 2, 3, 5, 6, 9],
            "MỘC": [1, 4, 5, 7, 8, 9],
            "THỦY": [1, 2, 3, 4, 5, 7],
            "HỎA": [3, 5, 6, 7, 8, 9],
            "THỔ": [4, 5, 6]
        };

        const NGU_HANH_COLORS = {
            "KIM": "#eab308", // Yellow 500
            "MỘC": "#22c55e", // Green 500
            "THỦY": "#0ea5e9", // Sky 500
            "HỎA": "#ef4444", // Red 500
            "THỔ": "#f97316"  // Orange 500
        };

        // --- CÁC HÀM TÍNH TOÁN LOGIC ---
        const calculateNumbers = (d, m, y) => {
            const dateStr = y.toString() + m.toString().padStart(2, '0') + d.toString().padStart(2, '0');
            const dateDigits = Array.from(dateStr).map(Number);
            const digitCount = Array(10).fill(0);

            dateDigits.forEach(num => digitCount[num]++);
            const sum = dateDigits.reduce((a, b) => a + b, 0);
            Array.from(sum.toString()).map(Number).forEach(num => digitCount[num]++);

            const secondNum = Array.from(sum.toString()).reduce((a, b) => a + Number(b), 0);
            Array.from(secondNum.toString()).map(Number).forEach(num => digitCount[num]++);

            const thirdNum = sum - (2 * (d < 10 ? d : Math.floor(d / 10)));
            Array.from(thirdNum.toString()).map(Number).forEach(num => digitCount[num]++);

            const fourthNum = Array.from(thirdNum.toString()).reduce((a, b) => a + Number(b), 0);
            Array.from(fourthNum.toString()).map(Number).forEach(num => digitCount[num]++);

            let res = {};
            for (let i = 1; i <= 9; i++) res[i] = digitCount[i] ? i.toString().repeat(digitCount[i]) : '';
            return res;
        };

        const calculateElementsForDate = (d, m, y) => {
            const numbers = calculateNumbers(d, m, y);
            let quant = {}, qual = {};
            for (const [el, cells] of Object.entries(NGU_HANH_RULES)) {
                quant[el] = cells.reduce((sum, c) => sum + (numbers[c] ? numbers[c].length : 0), 0);
                qual[el] = cells.map(c => numbers[c]).filter(v => v !== "").join(" ");
            }
            return { quantitative: quant, qualitative: qual, originalNumbers: numbers };
        };

        // --- STATE QUẢN LÝ ---
        let state = {
            activeTab: 'Month',

            monthStart: '', monthEnd: '12', monthTargetYear: '', extraYearsMonth: 0,
            yearStart: '', yearEnd: '',

            peopleMonth: [{ id: Date.now(), d: '', m: '', y: '', name: '' }],
            peopleYear: [{ id: Date.now() + 1, d: '', m: '', y: '', name: '' }],

            results: null,
            isChartUnlocked: false,
            passwordInput: ''
        };

        // --- LOCAL STORAGE ---
        function loadFromCache() {
            try {
                const tm = JSON.parse(localStorage.getItem('tshtt_time_Month'));
                if (tm) {
                    state.monthStart = tm.sMonth || '';
                    state.monthTargetYear = tm.tYear || '';
                }
                const ty = JSON.parse(localStorage.getItem('tshtt_time_Year'));
                if (ty) {
                    state.yearStart = ty.sYear || '';
                    state.yearEnd = ty.eYear || '';
                }
                const pm = JSON.parse(localStorage.getItem('tshtt_people_Month'));
                if (pm && pm.length) state.peopleMonth = pm;

                const py = JSON.parse(localStorage.getItem('tshtt_people_Year'));
                if (py && py.length) state.peopleYear = py;
            } catch (e) { console.warn("Lỗi đọc cache", e); }
        }

        function saveTimeToCache() {
            if (state.activeTab === 'Month') {
                localStorage.setItem('tshtt_time_Month', JSON.stringify({ sMonth: state.monthStart, tYear: state.monthTargetYear }));
            } else {
                localStorage.setItem('tshtt_time_Year', JSON.stringify({ sYear: state.yearStart, eYear: state.yearEnd }));
            }
        }

        function savePeopleToCache() {
            if (state.activeTab === 'Month') {
                localStorage.setItem('tshtt_people_Month', JSON.stringify(state.peopleMonth));
            } else {
                localStorage.setItem('tshtt_people_Year', JSON.stringify(state.peopleYear));
            }
        }

        // --- RENDER FUNCTIONS ---
        function renderTabs() {
            const container = document.getElementById('tabs-container');
            container.innerHTML = `
                <button id="tab-month" class="flex-1 py-3 sm:py-4 px-4 sm:px-6 rounded-xl font-bold text-sm sm:text-lg flex items-center justify-center gap-2 transition-all duration-300 shadow-sm active:scale-95
                    ${state.activeTab === 'Month' ? 'bg-sky-600 text-white shadow-sky-200' : 'bg-white text-slate-600 hover:bg-sky-50'}">
                    <i data-lucide="calendar-days" class="w-5 h-5 sm:w-6 sm:h-6"></i> XEM MATRIX THÁNG
                </button>
                <button id="tab-year" class="flex-1 py-3 sm:py-4 px-4 sm:px-6 rounded-xl font-bold text-sm sm:text-lg flex items-center justify-center gap-2 transition-all duration-300 shadow-sm active:scale-95
                    ${state.activeTab === 'Year' ? 'bg-sky-600 text-white shadow-sky-200' : 'bg-white text-slate-600 hover:bg-sky-50'}">
                    <i data-lucide="calendar" class="w-5 h-5 sm:w-6 sm:h-6"></i> XEM MATRIX NĂM
                </button>
            `;
            lucide.createIcons();
        }

        function renderTimeForm() {
            const container = document.getElementById('time-form-container');
            const inputClasses = "time-input w-full p-3 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-sky-500 outline-none transition-all";

            if (state.activeTab === 'Month') {
                container.innerHTML = `
                    <div>
                        <label class="block text-sm sm:text-base font-semibold text-slate-700 mb-2">Tháng bắt đầu:</label>
                        <input type="number" min="1" max="12" data-field="monthStart" value="${state.monthStart}" class="${inputClasses}" placeholder="Nhập tháng (1-12)"/>
                    </div>
                    <div>
                        <label class="block text-sm sm:text-base font-semibold text-slate-700 mb-2 flex flex-wrap items-center justify-between gap-1">
                            <span>Năm muốn xét:</span>
                            ${state.extraYearsMonth > 0 ? `<span class="text-orange-600 text-xs sm:text-sm font-semibold bg-orange-100 px-2 py-0.5 rounded shadow-sm">(Tới năm ${parseInt(state.monthTargetYear || 0) + state.extraYearsMonth})</span>` : ''}
                        </label>
                        <div class="flex gap-2">
                            <input type="number" data-field="monthTargetYear" value="${state.monthTargetYear}" class="${inputClasses}" placeholder="Nhập năm (VD: 2024)" />
                            <button id="btn-plus-year" class="bg-sky-600 text-white p-3 rounded-lg hover:bg-sky-700 transition active:scale-90 flex-shrink-0"><i data-lucide="plus" class="w-5 h-5"></i></button>
                            <button id="btn-minus-year" class="bg-slate-400 text-white p-3 rounded-lg hover:bg-slate-500 transition active:scale-90 flex-shrink-0"><i data-lucide="minus" class="w-5 h-5"></i></button>
                        </div>
                    </div>
                `;
            } else {
                container.innerHTML = `
                    <div>
                        <label class="block text-sm sm:text-base font-semibold text-slate-700 mb-2">Năm bắt đầu:</label>
                        <input type="number" data-field="yearStart" value="${state.yearStart}" class="${inputClasses}" placeholder="Nhập năm bắt đầu" />
                    </div>
                    <div>
                        <label class="block text-sm sm:text-base font-semibold text-slate-700 mb-2">Năm kết thúc:</label>
                        <input type="number" data-field="yearEnd" value="${state.yearEnd}" class="${inputClasses}" placeholder="Nhập năm kết thúc" />
                    </div>
                `;
            }
            lucide.createIcons();
        }

        function renderPeopleList() {
            const container = document.getElementById('people-list-container');
            const currentList = state.activeTab === 'Month' ? state.peopleMonth : state.peopleYear;
            const inputClasses = "person-input w-full p-2.5 sm:p-3 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-sky-500 focus:outline-none transition-all";

            container.innerHTML = currentList.map((p, idx) => `
                <div class="bg-white p-4 sm:p-5 rounded-xl border border-slate-200 shadow-sm relative mb-4 hover:shadow-md transition-shadow">
                    <div class="flex justify-between items-center mb-4 border-b border-slate-100 pb-3">
                        <h4 class="font-bold text-sky-600 flex items-center gap-2 text-sm sm:text-base">
                            <i data-lucide="user" class="w-5 h-5"></i> Người thứ ${idx + 1}
                        </h4>
                        ${idx > 0 ? `
                        <button data-id="${p.id}" class="btn-remove-person text-red-500 hover:text-white bg-red-50 hover:bg-red-500 px-3 py-1.5 rounded-md text-xs sm:text-sm font-semibold flex items-center gap-1 transition-colors active:scale-95">
                            <i data-lucide="trash-2" class="w-4 h-4"></i> <span class="hidden sm:inline">Xóa</span>
                        </button>` : ''}
                    </div>
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                        <div>
                            <label class="block text-xs sm:text-sm font-semibold text-slate-600 mb-1.5">Ngày sinh</label>
                            <input type="number" min="1" max="31" placeholder="DD" data-id="${p.id}" data-field="d" value="${p.d}" class="${inputClasses}" />
                        </div>
                        <div>
                            <label class="block text-xs sm:text-sm font-semibold text-slate-600 mb-1.5">Tháng sinh</label>
                            <input type="number" min="1" max="12" placeholder="MM" data-id="${p.id}" data-field="m" value="${p.m}" class="${inputClasses}" />
                        </div>
                        <div>
                            <label class="block text-xs sm:text-sm font-semibold text-slate-600 mb-1.5">Năm sinh</label>
                            <input type="number" placeholder="YYYY" data-id="${p.id}" data-field="y" value="${p.y}" class="${inputClasses}" />
                        </div>
                        <div>
                            <label class="block text-xs sm:text-sm font-semibold text-slate-600 mb-1.5">Tên (Tùy chọn)</label>
                            <input type="text" placeholder="VD: Nam, Tuấn..." data-id="${p.id}" data-field="name" value="${p.name}" class="${inputClasses}" />
                        </div>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        // SVG Chart Generator Function
        function generateSVGChart(headers, dataList, colLabel) {
            const height = 300;
            const paddingX = 40;
            const paddingY = 40;
            const width = Math.max(800, headers.length * 60);

            const datasets = Object.keys(NGU_HANH_COLORS).map(el => ({
                label: el,
                color: NGU_HANH_COLORS[el],
                data: dataList.map(d => d.quantitative[el])
            }));

            const maxVal = Math.max(...datasets.flatMap(d => d.data), 5) + 1;
            const getX = (index) => paddingX + (index * ((width - 2 * paddingX) / Math.max(1, headers.length - 1)));
            const getY = (val) => height - paddingY - ((val / maxVal) * (height - 2 * paddingY));

            let yGrid = '';
            for (let i = 0; i <= maxVal; i++) {
                yGrid += `
                    <g>
                        <line x1="${paddingX}" y1="${getY(i)}" x2="${width - paddingX}" y2="${getY(i)}" stroke="#e2e8f0" stroke-width="1" />
                        <text x="${paddingX - 10}" y="${getY(i) + 4}" font-size="12" fill="#64748b" text-anchor="end">${i}</text>
                    </g>
                `;
            }

            let xLabels = headers.map((h, i) => `
                <text x="${getX(i)}" y="${height - paddingY + 20}" font-size="12" fill="#64748b" text-anchor="middle">${colLabel ? colLabel + ' ' : ''}${h.text}</text>
            `).join('');

            let linesAndPoints = datasets.map((ds) => {
                const points = ds.data.map((val, idx) => `${getX(idx)},${getY(val)}`).join(' ');
                let ptsHTML = ds.data.map((val, idx) => `
                    <circle cx="${getX(idx)}" cy="${getY(val)}" r="4" fill="${ds.color}" stroke="#fff" stroke-width="2" class="hover:r-6 transition-all" />
                `).join('');

                return `
                    <g>
                        <polyline fill="none" stroke="${ds.color}" stroke-width="3" points="${points}" stroke-linejoin="round" class="transition-all duration-300 opacity-90 hover:opacity-100 hover:stroke-4" />
                        ${ptsHTML}
                    </g>
                `;
            }).join('');

            const legendHTML = datasets.map(ds => `
                <div class="flex items-center gap-1.5 whitespace-nowrap">
                    <span class="w-3 h-3 rounded-full flex-shrink-0" style="background-color: ${ds.color}"></span>
                    <span class="text-xs font-semibold text-slate-700">${ds.label}</span>
                </div>
            `).join('');

            return `
                <div class="w-full overflow-x-auto pb-4 custom-scrollbar">
                    <div style="width: ${width}px; height: ${height}px; position: relative;">
                        <svg width="${width}" height="${height}" class="bg-slate-50 rounded-xl border border-slate-200">
                            ${yGrid}
                            ${xLabels}
                            ${linesAndPoints}
                        </svg>
                        <div class="absolute top-2 right-2 flex flex-wrap gap-2 sm:gap-4 bg-white/90 px-3 py-2 sm:px-4 sm:py-2 rounded-lg sm:rounded-full shadow-sm backdrop-blur-sm border border-slate-100 max-w-[90%] justify-end">
                            ${legendHTML}
                        </div>
                    </div>
                </div>
            `;
        }

        function renderResults() {
            const container = document.getElementById('results-container');
            if (!state.results) {
                container.innerHTML = '';
                return;
            }

            const r = state.results;

            let passwordSection = !state.isChartUnlocked ? `
                <div class="bg-white border-2 border-dashed border-slate-300 rounded-2xl p-6 sm:p-8 text-center mb-8 shadow-sm">
                    <div class="bg-slate-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                        <i data-lucide="lock" class="w-8 h-8 text-slate-400"></i>
                    </div>
                    <h4 class="text-lg sm:text-xl font-bold text-slate-800 mb-2">Mở khóa Biểu đồ Toàn cảnh</h4>
                    <p class="text-sm sm:text-base text-slate-500 mb-6 max-w-md mx-auto">Nhập mật khẩu để xem phân tích biểu đồ biến thiên ngũ hành của tất cả mọi người.</p>
                    <div class="flex flex-col sm:flex-row justify-center items-center gap-3 w-full max-w-sm mx-auto">
                        <input type="password" id="password-input" placeholder="Nhập mật khẩu..." value="${state.passwordInput}" 
                            class="px-4 py-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-sky-500 outline-none w-full sm:w-64 text-center text-lg shadow-inner transition-shadow" />
                        <button id="btn-unlock" class="w-full sm:w-auto px-6 py-3 bg-slate-800 hover:bg-slate-900 text-white font-bold rounded-xl flex items-center justify-center gap-2 transition-all active:scale-95 shadow-md">
                            <i data-lucide="unlock" class="w-5 h-5"></i> Mở
                        </button>
                    </div>
                </div>
            ` : '';

            let tablesSection = `
                <div class="grid grid-cols-1 xl:grid-cols-2 gap-6 sm:gap-8 items-start">
                    ${r.compiledData.map(dataObj => {

                let quantRows = Object.keys(NGU_HANH_COLORS).map(el => `
                            <tr class="border-b border-slate-300 hover:bg-sky-50 transition-colors">
                                <td class="p-3 sm:p-4 font-bold sticky left-0 bg-white z-10 border-r-2 border-slate-300 shadow-[2px_0_5px_rgba(0,0,0,0.05)]" style="color: ${NGU_HANH_COLORS[el]}">${el}</td>
                                ${dataObj.dataList.map((d, i) => `
                                    <td class="p-3 sm:p-4 text-slate-600 whitespace-nowrap min-w-[80px]
                                        ${r.timeLabels[i].year % 2 === 0 ? 'bg-sky-50/50' : 'bg-orange-50/50'} 
                                        ${i > 0 && r.timeLabels[i - 1].year !== r.timeLabels[i].year ? 'border-l-2 border-slate-400' : 'border-l border-slate-300'}">
                                        ${d.quantitative[el]}
                                    </td>
                                `).join('')}
                            </tr>
                        `).join('');

                let qualRows = Object.keys(NGU_HANH_COLORS).map(el => `
                            <tr class="border-b border-slate-300 hover:bg-sky-50 transition-colors">
                                <td class="p-3 sm:p-4 font-bold sticky left-0 bg-white z-10 border-r-2 border-slate-300 shadow-[2px_0_5px_rgba(0,0,0,0.05)]" style="color: ${NGU_HANH_COLORS[el]}">${el}</td>
                                ${dataObj.dataList.map((d, i) => `
                                    <td class="p-3 sm:p-4 text-slate-600 whitespace-nowrap min-w-[80px]
                                        ${r.timeLabels[i].year % 2 === 0 ? 'bg-sky-50/50' : 'bg-orange-50/50'} 
                                        ${i > 0 && r.timeLabels[i - 1].year !== r.timeLabels[i].year ? 'border-l-2 border-slate-400' : 'border-l border-slate-300'}">
                                        ${d.qualitative[el] || "-"}
                                    </td>
                                `).join('')}
                            </tr>
                        `).join('');

                let chartHTML = state.isChartUnlocked ? `
                            <div class="pt-6 border-t border-slate-300 animate-fade-in-up duration-500">
                                <h4 class="font-bold text-slate-800 mb-4 flex items-center gap-2 text-lg">
                                    <i data-lucide="bar-chart-2" class="w-6 h-6 text-sky-500"></i> Biểu đồ biến thiên
                                </h4>
                                ${generateSVGChart(r.timeLabels, dataObj.dataList, r.colLabel)}
                            </div>
                        ` : '';

                return `
                            <div class="w-full bg-white rounded-2xl shadow-sm border-2 border-sky-100 p-4 sm:p-6 relative mt-6">
                                <div class="absolute -top-5 left-4 sm:left-6 bg-gradient-to-r from-sky-600 to-blue-600 text-white px-4 sm:px-6 py-2 rounded-full font-bold shadow-lg shadow-blue-200 flex items-center gap-2 max-w-[90%] overflow-hidden text-ellipsis whitespace-nowrap">
                                    <i data-lucide="user" class="w-4 h-4 flex-shrink-0"></i> 
                                    <span class="truncate">${dataObj.person.displayName}</span> 
                                    <span class="text-sky-200 font-normal flex-shrink-0 text-sm">(${dataObj.person.d}/${dataObj.person.m}/${dataObj.person.y})</span>
                                </div>
                                
                                <div class="mt-6 space-y-6">
                                    <div class="overflow-x-auto rounded-xl border-2 border-slate-300 shadow-sm">
                                        <table class="w-full text-sm sm:text-base text-center">
                                            <thead class="bg-slate-800 text-white border-b-2 border-slate-600">
                                                <tr>
                                                    <th class="p-3 sm:p-4 sticky left-0 bg-slate-800 z-20 border-r-2 border-slate-600 whitespace-nowrap shadow-[2px_0_5px_rgba(0,0,0,0.1)]">Định lượng</th>
                                                    ${r.timeLabels.map((h, i) => `
                                                        <th class="p-3 sm:p-4 whitespace-nowrap font-semibold ${i > 0 && r.timeLabels[i - 1].year !== h.year ? 'border-l-2 border-slate-400' : 'border-l border-slate-600'}">
                                                            ${r.colLabel} ${h.text}
                                                        </th>
                                                    `).join('')}
                                                </tr>
                                            </thead>
                                            <tbody>${quantRows}</tbody>
                                        </table>
                                    </div>

                                    <div class="overflow-x-auto rounded-xl border-2 border-slate-300 shadow-sm">
                                        <table class="w-full text-sm sm:text-base text-center">
                                            <thead class="bg-slate-600 text-white border-b-2 border-slate-500">
                                                <tr>
                                                    <th class="p-3 sm:p-4 sticky left-0 bg-slate-700 z-20 border-r-2 border-slate-500 whitespace-nowrap shadow-[2px_0_5px_rgba(0,0,0,0.1)]">Định tính</th>
                                                    ${r.timeLabels.map((h, i) => `
                                                        <th class="p-3 sm:p-4 whitespace-nowrap font-semibold ${i > 0 && r.timeLabels[i - 1].year !== h.year ? 'border-l-2 border-slate-400' : 'border-l border-slate-500'}">
                                                            ${r.colLabel} ${h.text}
                                                        </th>
                                                    `).join('')}
                                                </tr>
                                            </thead>
                                            <tbody>${qualRows}</tbody>
                                        </table>
                                    </div>

                                    ${chartHTML}
                                </div>
                            </div>
                        `;
            }).join('')}
                </div>
            `;

            let matrixSectionHTML = r.globalDatesStr.map((dateStr, timeIdx) => {
                const yearStr = dateStr.includes('/') ? dateStr.split('/')[1] : dateStr;
                const yearNum = parseInt(yearStr);
                const prefix = r.type === 'Month' ? 'THÁNG' : 'NĂM';

                const isEven = yearNum % 2 === 0;
                const btnClass = isEven ? 'bg-sky-50 border-l-4 border-l-sky-500 hover:bg-sky-100' : 'bg-orange-50 border-l-4 border-l-orange-500 hover:bg-orange-100';
                const iconClass = isEven ? 'text-sky-600' : 'text-orange-600';

                const childrenHtml = r.compiledData.map(personObj => {
                    const num = personObj.dataList[timeIdx].originalNumbers;
                    const quant = personObj.dataList[timeIdx].quantitative;

                    const sortedElements = Object.keys(NGU_HANH_COLORS).map(k => ({ n: k, v: quant[k], c: NGU_HANH_COLORS[k] })).sort((a, b) => b.v - a.v);

                    // LOGIC VẼ TABLE 9 Ô (GRID 3x3)
                    const gridBoxes = [3, 6, 9, 2, 5, 8, 1, 4, 7].map(boxKey => {
                        const val = num[boxKey] || "";

                        // ĐÃ SỬA: Khóa cứng 1 kích thước chữ cho mọi con số, nhỏ hơn 30% so với bản cũ
                        const textSizeClass = 'text-[14px] sm:text-[21px]';

                        return `
                        <div class="bg-white w-full h-full flex items-center justify-center ${textSizeClass} font-black text-slate-800 transition-colors hover:bg-slate-50 cursor-default p-1 break-all text-center leading-tight tracking-tight overflow-hidden">
                            ${val}
                        </div>
                        `;
                    }).join('');

                    // MỚI: Thêm border, padding và background cho từng thẻ ngũ hành (cũng giảm số nhỏ lại xíu cho cân đối)
                    const sortedHTML = sortedElements.map(el => `
                        <div class="text-center flex-1 border border-slate-200 rounded-lg py-1.5 sm:py-2 bg-slate-50 shadow-sm hover:bg-slate-100 transition-colors">
                            <span class="block text-base sm:text-xl font-black mb-0.5" style="color: ${el.c}">${el.v}</span>
                            <span class="text-[10px] sm:text-xs font-bold uppercase tracking-wider" style="color: ${el.c}">${el.n}</span>
                        </div>
                    `).join('');

                    return `
                        <div class="bg-white p-5 sm:p-7 rounded-2xl border border-slate-200 w-full max-w-[400px] shrink-0 hover:shadow-lg transition-shadow flex flex-col h-full shadow-sm mx-auto lg:mx-0">
                            <div class="text-center text-lg sm:text-xl font-bold text-sky-700 border-b border-dashed border-slate-300 pb-4 mb-6 flex items-center justify-center gap-2">
                                <i data-lucide="user" class="w-5 h-5"></i> <span class="truncate max-w-[220px]">${personObj.person.displayName}</span>
                            </div>
                            
                            <div class="flex-grow flex items-center justify-center mb-6">
                                <div class="w-[200px] h-[200px] sm:w-[240px] sm:h-[240px] mx-auto border border-slate-300 rounded-xl overflow-hidden shadow-sm">
                                    <div class="grid grid-cols-3 grid-rows-3 gap-[1px] w-full h-full bg-slate-300">
                                        ${gridBoxes}
                                    </div>
                                </div>
                            </div>

                            <div class="mt-auto flex justify-between items-center gap-1.5 sm:gap-2 bg-white p-3 sm:p-4 rounded-xl border border-slate-100 shadow-[0_0_10px_rgba(0,0,0,0.04)] ring-1 ring-slate-50">
                                ${sortedHTML}
                            </div>
                        </div>
                    `;
                }).join('');

                return `
                    <div class="mb-6 rounded-2xl overflow-hidden shadow-sm border border-slate-200 bg-white">
                        <button class="accordion-toggle w-full flex justify-between items-center p-4 sm:p-5 transition-colors duration-200 active:bg-slate-50 ${btnClass}">
                            <span class="font-bold text-slate-800 flex items-center gap-3 text-sm sm:text-base">
                                <i data-lucide="sparkles" class="w-5 h-5 sm:w-6 sm:h-6 flex-shrink-0 ${iconClass}"></i>
                                HUYỀN CƠ ${prefix}: ${dateStr}
                            </span>
                            <div class="bg-white/50 p-1 rounded-full shadow-sm">
                                <i data-lucide="chevron-down" class="accordion-icon w-5 h-5 sm:w-6 sm:h-6 text-slate-600"></i>
                            </div>
                        </button>
                        <div class="hidden accordion-content p-4 sm:p-8 bg-slate-50/50 border-t border-slate-100 overflow-x-auto custom-scrollbar">
                            <div class="flex flex-col lg:flex-row gap-6 sm:gap-8 pb-4 items-center lg:items-stretch justify-start w-full lg:w-max">
                                ${childrenHtml}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            container.innerHTML = `
                <div class="animate-fade-in-up">
                    ${passwordSection}
                    ${tablesSection}
                    
                    <div class="mt-12 sm:mt-16">
                        <h2 class="text-xl sm:text-2xl font-bold text-slate-800 mb-6 pb-2 border-b-2 border-sky-500 inline-flex items-center gap-3">
                            <i data-lucide="sparkles" class="w-6 h-6 sm:w-8 sm:h-8 text-sky-600"></i> Chi Tiết Huyền Cơ So Sánh
                        </h2>
                        <div class="space-y-4">
                            ${matrixSectionHTML}
                        </div>
                    </div>
                </div>
            `;
            lucide.createIcons();
        }

        // --- HANDLERS ---
        function handleGenerate() {
            const isMonth = state.activeTab === 'Month';
            const currentPeople = isMonth ? state.peopleMonth : state.peopleYear;

            if (currentPeople.length === 0) return alert("Vui lòng thêm ít nhất 1 người!");
            if (currentPeople.some(p => !p.d || !p.m || !p.y)) return alert("Vui lòng nhập đủ Ngày/Tháng/Năm sinh cho tất cả mọi người!");

            let timeLabels = [];
            let globalDatesStr = [];

            if (isMonth) {
                const sM = parseInt(state.monthStart) || 1;
                const eM = parseInt(state.monthEnd) || 12;
                const tY = parseInt(state.monthTargetYear);
                if (!tY) return alert("Vui lòng nhập năm muốn xét!");

                for (let year = tY; year <= tY + state.extraYearsMonth; year++) {
                    let startM = (year === tY) ? sM : 1;
                    let endM = (year === tY + state.extraYearsMonth) ? eM : 12;
                    for (let month = startM; month <= endM; month++) {
                        timeLabels.push({ text: state.extraYearsMonth > 0 ? `${month}/${year}` : month, year: year });
                        globalDatesStr.push(`${month}/${year}`);
                    }
                }
            } else {
                const sY = parseInt(state.yearStart);
                const eY = parseInt(state.yearEnd);
                if (!sY || !eY || sY > eY) return alert("Năm bắt đầu/kết thúc không hợp lệ!");

                for (let year = sY; year <= eY; year++) {
                    timeLabels.push({ text: year, year: year });
                    globalDatesStr.push(`${year}`);
                }
            }

            const compiledData = currentPeople.map((p, idx) => {
                const name = p.name || `Người ${idx + 1}`;
                const dataList = timeLabels.map(labelInfo => {
                    let calcMonth = parseInt(p.m);
                    let calcYear = labelInfo.year;

                    if (isMonth) {
                        calcMonth = typeof labelInfo.text === 'string' && labelInfo.text.includes('/')
                            ? parseInt(labelInfo.text.split('/')[0])
                            : parseInt(labelInfo.text);
                    }
                    return calculateElementsForDate(parseInt(p.d), calcMonth, calcYear);
                });

                return { person: { ...p, displayName: name }, dataList };
            });

            state.results = {
                type: state.activeTab,
                timeLabels,
                globalDatesStr,
                compiledData,
                colLabel: isMonth && state.extraYearsMonth === 0 ? "Tháng" : ""
            };

            renderResults();
        }

        function unlockCharts() {
            if (state.passwordInput === '3131') {
                state.isChartUnlocked = true;
                renderResults();
            } else {
                alert('Mật khẩu không chính xác!');
            }
        }

        // --- EVENT LISTENERS ---
        document.addEventListener('DOMContentLoaded', () => {
            loadFromCache();
            renderTabs();
            renderTimeForm();
            renderPeopleList();
            lucide.createIcons();
        });

        document.getElementById('app').addEventListener('click', (e) => {
            // TABS
            if (e.target.closest('#tab-month') && state.activeTab !== 'Month') {
                state.activeTab = 'Month';
                state.results = null;
                renderTabs(); renderTimeForm(); renderPeopleList(); renderResults();
            }
            if (e.target.closest('#tab-year') && state.activeTab !== 'Year') {
                state.activeTab = 'Year';
                state.results = null;
                renderTabs(); renderTimeForm(); renderPeopleList(); renderResults();
            }

            // EXTRA YEAR BUTTONS
            if (e.target.closest('#btn-plus-year')) {
                state.extraYearsMonth++;
                renderTimeForm();
            }
            if (e.target.closest('#btn-minus-year')) {
                state.extraYearsMonth = Math.max(0, state.extraYearsMonth - 1);
                renderTimeForm();
            }

            // ADD PERSON
            if (e.target.closest('#btn-add-person')) {
                if (state.activeTab === 'Month') {
                    state.peopleMonth.push({ id: Date.now(), d: '', m: '', y: '', name: '' });
                } else {
                    state.peopleYear.push({ id: Date.now(), d: '', m: '', y: '', name: '' });
                }
                savePeopleToCache();
                renderPeopleList();
            }

            // REMOVE PERSON
            if (e.target.closest('.btn-remove-person')) {
                const id = Number(e.target.closest('.btn-remove-person').dataset.id);
                if (state.activeTab === 'Month') {
                    state.peopleMonth = state.peopleMonth.filter(p => p.id !== id);
                } else {
                    state.peopleYear = state.peopleYear.filter(p => p.id !== id);
                }
                savePeopleToCache();
                renderPeopleList();
            }

            // GENERATE
            if (e.target.closest('#btn-generate')) {
                handleGenerate();
            }

            // UNLOCK CHART
            if (e.target.closest('#btn-unlock')) {
                unlockCharts();
            }

            // ACCORDION TOGGLE
            if (e.target.closest('.accordion-toggle')) {
                const btn = e.target.closest('.accordion-toggle');
                const content = btn.nextElementSibling;
                const icon = btn.querySelector('.accordion-icon');

                if (content.classList.contains('hidden')) {
                    content.classList.remove('hidden');
                    icon.setAttribute('data-lucide', 'chevron-up');
                } else {
                    content.classList.add('hidden');
                    icon.setAttribute('data-lucide', 'chevron-down');
                }
                lucide.createIcons();
            }
        });

        // Event delegation for Inputs
        document.getElementById('app').addEventListener('input', (e) => {
            if (e.target.matches('.time-input')) {
                const field = e.target.dataset.field;
                state[field] = e.target.value;
                saveTimeToCache();
            }

            if (e.target.matches('.person-input')) {
                const id = Number(e.target.dataset.id);
                const field = e.target.dataset.field;
                const list = state.activeTab === 'Month' ? state.peopleMonth : state.peopleYear;
                const person = list.find(p => p.id === id);
                if (person) {
                    person[field] = e.target.value;
                    savePeopleToCache();
                }
            }

            if (e.target.matches('#password-input')) {
                state.passwordInput = e.target.value;
            }
        });

        document.getElementById('app').addEventListener('keydown', (e) => {
            if (e.target.matches('#password-input') && e.key === 'Enter') {
                unlockCharts();
            }
        });

    </script>
</body>

</html>
